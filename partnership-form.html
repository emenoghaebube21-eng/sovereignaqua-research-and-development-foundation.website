<!DOCTYPE html>
<html>
<head>
  <title>Partnership Application</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body style="font-family:Arial; padding:20px;">

<h1 style="text-align:center;">Partnership Application</h1>

<form action="https://formsubmit.co/sovereignaquafoundation@gmail.com" method="POST" style="max-width:600px;margin:auto;">

  <label>Organization Name</label><br>
  <input type="text" name="organization" required style="width:100%;padding:10px;"><br><br>

  <label>Contact Person</label><br>
  <input type="text" name="name" required style="width:100%;padding:10px;"><br><br>

  <label>Email Address</label><br>
  <input type="email" name="email" required style="width:100%;padding:10px;"><br><br>

  <label>Type of Organization</label><br>
  <select name="type" style="width:100%;padding:10px;">
    <option>Nonprofit</option>
    <option>University / Research Institution</option>
    <option>Government Agency</option>
    <option>Private Sector</option>
  </select><br><br>

  <label>Area of Collaboration</label><br>
  <select name="collaboration" style="width:100%;padding:10px;">
    <option>Research</option>
    <option>Infrastructure Development</option>
    <option>Environmental Programs</option>
    <option>Humanitarian Support</option>
  </select><br><br>

  <label>Proposal Summary</label><br>
  <textarea name="message" rows="5" required style="width:100%;padding:10px;"></textarea><br><br>

  <button type="submit" style="
    background:#0b1c2c;
    color:white;
    padding:15px;
    width:100%;
    border:none;
    border-radius:6px;
    font-size:16px;
  ">
    Submit Application
  </button>

</form>

</body>
</html>
