<script>

const counters =
document.querySelectorAll('.counter');

counters.forEach(counter=>{

const updateCounter=()=>{

const target =
+counter.getAttribute('data-target');

const count =
+counter.innerText;

const increment =
target/150;

if(count < target){

counter.innerText =
Math.ceil(count + increment);

setTimeout(updateCounter,10);

}else{

counter.innerText =
target.toLocaleString();

}

};

updateCounter();

});

</script>

/* ========================================= */
/* PREMIUM HERO */

#hero-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
}

.hero-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(
135deg,
rgba(2,12,27,.90),
rgba(0,75,140,.55)
);
z-index:-2;
}

.premium-hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:120px 8%;
position:relative;
}

.hero-content{
max-width:950px;
text-align:center;
}

.hero-badge{
display:inline-block;
padding:12px 24px;
border-radius:50px;
background:rgba(0,255,179,.10);
border:1px solid rgba(0,255,179,.35);
color:#00ffb3;
font-size:12px;
font-weight:700;
letter-spacing:2px;
margin-bottom:30px;
}

.hero-title{
font-size:78px;
font-weight:800;
line-height:1.05;
margin-bottom:30px;
color:#ffffff;
}

.hero-title span{
background:
linear-gradient(
90deg,
#00d9ff,
#00ffb3
);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero-description{
font-size:22px;
line-height:1.8;
color:#d7e7f8;
max-width:850px;
margin:auto;
margin-bottom:40px;
}

.hero-action-buttons{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-bottom:60px;
}

.hero-btn-primary{
background:
linear-gradient(
90deg,
#00ffb3,
#00d9ff
);
color:#04111f;
padding:18px 40px;
border-radius:12px;
font-weight:700;
text-decoration:none;
}

.hero-btn-secondary{
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.15);
color:white;
padding:18px 40px;
border-radius:12px;
text-decoration:none;
}

.hero-stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
}

.stat-box{
background:rgba(255,255,255,.06);
backdrop-filter:blur(20px);
padding:30px;
border-radius:20px;
border:1px solid rgba(255,255,255,.08);
}

.stat-box h3{
font-size:38px;
color:#00ffb3;
margin-bottom:10px;
}

.stat-box span{
color:#d7e7f8;
}

@media(max-width:900px){

.hero-title{
font-size:52px;
}

.hero-stats{
grid-template-columns:1fr 1fr;
}

}

@media(max-width:600px){

.hero-title{
font-size:42px;
}

.hero-stats{
grid-template-columns:1fr;
}

.hero-description{
font-size:18px;
}

}
