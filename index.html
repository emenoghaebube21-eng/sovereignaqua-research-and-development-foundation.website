const counters =
document.querySelectorAll('.counter');

counters.forEach(counter=>{

const updateCounter=()=>{

const target=
+counter.getAttribute('data-target');

const count=
+counter.innerText;

const increment=
target/200;

if(count<target){

counter.innerText=
Math.ceil(count+increment);

setTimeout(updateCounter,10);

}else{

counter.innerText=
target.toLocaleString();

}

};

updateCounter();

});
