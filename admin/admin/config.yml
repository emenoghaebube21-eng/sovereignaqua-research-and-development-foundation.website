###############################################################
# DOCUMENT LIBRARY
###############################################################

- name: "documents"

  label: "Document Library"

  folder: "content/documents"

  create: true

  slug: "{{slug}}"

  fields:

    - {label: Title, name: title, widget: string}

    - {label: Category, name: category, widget: string}

    - {label: PDF File, name: file, widget: file}

    - {label: Description, name: description, widget: text}

###############################################################
# EVENTS
###############################################################

- name: "events"

  label: "Events"

  folder: "content/events"

  create: true

  slug: "{{year}}-{{month}}-{{day}}-{{slug}}"

  fields:

    - {label: Event Title, name: title, widget: string}

    - {label: Event Date, name: date, widget: datetime}

    - {label: Venue, name: venue, widget: string}

    - {label: Featured Image, name: image, widget: image}

    - {label: Description, name: body, widget: markdown}

###############################################################
# NAVIGATION
###############################################################

- name: "navigation"

  label: "Navigation"

  file: "data/navigation.yml"

  fields:

    - label: Menu

      name: menu

      widget: list

      fields:

        - {label: Title, name: title, widget: string}

        - {label: URL, name: url, widget: string}

###############################################################
# FOOTER
###############################################################

- name: "footer"

  label: "Footer"

  file: "data/footer.yml"

  fields:

    - {label: Foundation Name, name: foundation_name, widget: string}

    - {label: Footer Description, name: description, widget: markdown}

    - {label: Copyright, name: copyright, widget: string}

###############################################################
# SEO
###############################################################

- name: "seo"

  label: "SEO"

  file: "data/seo.yml"

  fields:

    - {label: Site Title, name: site_title, widget: string}

    - {label: Meta Description, name: meta_description, widget: text}

    - {label: Keywords, name: keywords, widget: list}

    - {label: Open Graph Image, name: og_image, widget: image}

###############################################################
# SOCIAL MEDIA
###############################################################

- name: "social"

  label: "Social Media"

  file: "data/social.yml"

  fields:

    - {label: Facebook, name: facebook, widget: string, required: false}

    - {label: LinkedIn, name: linkedin, widget: string, required: false}

    - {label: YouTube, name: youtube, widget: string, required: false}

    - {label: X (Twitter), name: twitter, widget: string, required: false}

    - {label: Instagram, name: instagram, widget: string, required: false}
